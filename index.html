<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elektro Revize Montáže</title>
<meta name="description" content="">
<meta name="keywords" content="">
<link rel="canonical" href="https://elrevmont.cz/">
<meta property="og:type" content="website">
<meta property="og:title" content="">
<meta property="og:description" content="">
<meta property="og:image" content="">
<link rel="icon" href="assets/img/favicon.png">
<link rel="stylesheet" href="css/style.css">
<script type="application/ld+json" id="schema-ld">{}</script>
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="container navbar-inner">
    <a href="#hero" class="logo">
      <span class="logo-icon" id="logo-icon"></span>
      <span id="nav-logo">ELREVMONT</span>
    </a>
    <nav class="nav-links" id="nav-links"></nav>
    <a href="#kontakt" class="btn btn-primary nav-cta" id="nav-cta">Kontakt</a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- 1. HERO -->
<section class="hero" id="hero">
  <div class="hero-bg-image" id="hero-bg"></div>
  <div class="container hero-inner">
    <span class="hero-eyebrow-tag" id="hero-eyebrow"></span>
    <h1 class="hero-title" id="hero-title"></h1>
    <p class="hero-subtitle" id="hero-subtitle"></p>
    <div class="hero-actions">
      <a href="tel:" class="btn btn-primary" id="hero-btn-phone"></a>
      <a href="mailto:" class="btn hero-btn-secondary" id="hero-btn-email"></a>
    </div>
  </div>
  <div class="hero-scroll-cue" id="hero-scroll-cue"></div>
</section>

<!-- 2. O FIRMĚ -->
<section class="about-firm py" id="o-firme">
  <div class="container about-firm-inner">
    <div data-reveal>
      <div class="eyebrow" id="aboutfirm-eyebrow"></div>
      <h2 class="section-title" id="aboutfirm-title"></h2>
    </div>
    <div data-reveal>
      <p class="about-firm-text" id="aboutfirm-text"></p>
      <div class="about-firm-badges" id="aboutfirm-badges" style="margin-top:32px"></div>
    </div>
  </div>
</section>

<!-- 3. SLUŽBY -->
<section class="services py" id="sluzby">
  <div class="container">
    <div class="section-head" data-reveal>
      <div class="eyebrow on-dark" id="services-eyebrow"></div>
      <h2 class="section-title" id="services-title" style="color:#F5F7FA"></h2>
      <p class="section-subtitle" id="services-subtitle" style="color:rgba(245,247,250,0.65)"></p>
    </div>
    <div class="services-grid" id="services-grid"></div>
  </div>
</section>

<!-- 4. REVIZE -->
<section class="revize py" id="revize">
  <div class="container">
    <div class="section-head" data-reveal>
      <div class="eyebrow" id="revize-eyebrow"></div>
      <p class="eyebrow" style="font-size:12px;opacity:0.75" id="revize-norms"></p>
      <h2 class="section-title" id="revize-title"></h2>
      <p class="revize-intro" id="revize-intro"></p>
    </div>

    <h4 style="font-family:var(--f-mono);font-size:13px;letter-spacing:0.05em;text-transform:uppercase;color:var(--c-steel);margin-bottom:20px" id="revize-types-title"></h4>
    <div class="revize-types" id="revize-types"></div>

    <div class="revize-why" data-reveal>
      <h3 id="revize-why-title"></h3>
      <ul class="revize-why-list" id="revize-why-list"></ul>
    </div>

    <div class="revize-columns">
      <div>
        <h4 id="revize-objects-title"></h4>
        <div class="chip-list" id="revize-objects-list"></div>
      </div>
      <div>
        <h4 id="revize-legis-title"></h4>
        <ul class="legis-list" id="revize-legis-list"></ul>
      </div>
    </div>
  </div>
</section>

<!-- 5. MONTAZE -->
<section class="montaze py" id="montaze">
  <div class="container montaze-inner">
    <div data-reveal>
      <div class="eyebrow on-dark" id="montaze-eyebrow"></div>
      <h2 class="section-title" id="montaze-title" style="color:#F5F7FA"></h2>
      <p class="montaze-desc" id="montaze-desc"></p>
    </div>
    <ul class="montaze-list" id="montaze-list"></ul>
  </div>
</section>

<!-- 6. SKOLENI -->
<section class="skoleni py" id="skoleni">
  <div class="container">
    <div class="section-head" data-reveal>
      <div class="eyebrow" id="skoleni-eyebrow"></div>
      <h2 class="section-title" id="skoleni-title"></h2>
      <p class="skoleni-desc" id="skoleni-desc"></p>
    </div>
    <div class="skoleni-grid" id="skoleni-grid"></div>
  </div>
</section>

<!-- 7. GALERIE -->
<section class="gallery py" id="galerie">
  <div class="container">
    <div class="section-head" data-reveal>
      <div class="eyebrow" id="gallery-eyebrow"></div>
      <h2 class="section-title" id="gallery-title"></h2>
      <p class="section-subtitle" id="gallery-subtitle"></p>
    </div>
    <div class="gallery-categories" id="gallery-categories"></div>
  </div>

  <!-- Lightbox / album detail -->
  <div class="gallery-lightbox" id="gallery-lightbox">
    <div class="gallery-lightbox-header">
      <h3 id="lightbox-title"></h3>
      <button class="gallery-lightbox-close" id="lightbox-close" aria-label="Zavřít"></button>
    </div>
    <div class="gallery-lightbox-grid" id="lightbox-grid"></div>
  </div>
</section>

<!-- 8. REFERENCE -->
<section class="reference py" id="reference">
  <div class="container">
    <div class="section-head" data-reveal>
      <div class="eyebrow on-dark" id="reference-eyebrow"></div>
      <h2 class="section-title" id="reference-title" style="color:#F5F7FA"></h2>
    </div>
  </div>
  <div class="marquee-wrap">
    <div class="marquee-track" id="marquee-row-1"></div>
    <div class="marquee-track reverse" id="marquee-row-2"></div>
  </div>
</section>

<!-- 9. KONTAKT -->
<section class="contact py" id="kontakt">
  <div class="container contact-inner">
    <div data-reveal>
      <div class="eyebrow" id="contact-eyebrow"></div>
      <h2 class="section-title" id="contact-title"></h2>
      <p class="section-subtitle" id="contact-subtitle"></p>
      <div id="contact-info"></div>
    </div>
    <div class="contact-map" data-reveal>
      <iframe
        id="contact-map-iframe"
        class="contact-map-iframe"
        src=""
        width="100%"
        height="100%"
        style="border:0"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        title="Mapa – provozovna Elrevmont">
      </iframe>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="container">
    <div class="footer-inner">
      <div class="footer-brand">
        <div class="logo" style="color:#F5F7FA">
          <span class="logo-icon" id="footer-logo-icon"></span>
          <span id="footer-name"></span>
        </div>
        <p class="footer-tagline" id="footer-tagline"></p>
      </div>
      <nav class="footer-links" id="footer-links"></nav>
    </div>
    <div class="footer-bottom-row">
      <div class="footer-bottom" id="footer-copyright"></div>
      <a href="admin.html" class="footer-admin-link" title="Administrace" aria-label="Administrace">
        <span id="footer-admin-icon"></span>
      </a>
    </div>
  </div>
</footer>

<script src="js/icons.js"></script>
<script src="js/main.js"></script>
</body>
</html>
