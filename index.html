<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elektro Revize Montáže</title>
<meta name="description" content="">
<meta name="keywords" content="">
<link rel="canonical" href="https://elrevmont.cz/">
<meta property="og:type" content="website">
<meta property="og:title" content="">
<meta property="og:description" content="">
<meta property="og:image" content="">
<link rel="icon" href="assets/img/favicon.png">
<link rel="stylesheet" href="css/style.css">
<script type="application/ld+json" id="schema-ld">{}</script>
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="container navbar-inner">
    <a href="#hero" class="logo"><span class="dot"></span><span id="nav-logo">ELREVMONT</span></a>
    <nav class="nav-links" id="nav-links"></nav>
    <a href="#kontakt" class="btn btn-primary nav-cta" id="nav-cta">Nezávazná poptávka</a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- HERO -->
<section class="hero stamp-frame" id="hero">
  <div class="hero-bg-image" id="hero-bg"></div>
  <div class="container hero-inner">
    <div class="eyebrow" id="hero-eyebrow"></div>
    <h1 class="hero-title" id="hero-title"></h1>
    <p class="hero-subtitle" id="hero-subtitle"></p>
    <div class="hero-actions">
      <a href="#kontakt" class="btn btn-primary" id="hero-btn-primary"></a>
      <a href="#revize" class="btn btn-outline" id="hero-btn-secondary"></a>
    </div>
    <div class="hero-stats" id="hero-stats"></div>
  </div>
</section>

<!-- SERVICES -->
<section class="services py" id="sluzby">
  <div class="container">
    <div class="section-head" data-reveal>
      <div class="eyebrow" id="services-eyebrow"></div>
      <h2 class="section-title" id="services-title"></h2>
      <p class="section-subtitle" id="services-subtitle"></p>
    </div>
    <div class="services-grid" id="services-grid"></div>
  </div>
</section>

<!-- REVIZE -->
<section class="revize py stamp-frame" id="revize">
  <div class="container">
    <div class="section-head" data-reveal>
      <div class="eyebrow" id="revize-eyebrow"></div>
      <h2 class="section-title" id="revize-title"></h2>
      <p class="revize-intro" id="revize-intro"></p>
    </div>
    <div class="revize-types" id="revize-types"></div>
    <div class="revize-columns">
      <div>
        <h4 id="revize-objects-title"></h4>
        <div class="chip-list" id="revize-objects-list"></div>
      </div>
      <div>
        <h4 id="revize-legis-title"></h4>
        <ul class="legis-list" id="revize-legis-list"></ul>
      </div>
    </div>
  </div>
</section>

<!-- MONTAZE -->
<section class="montaze py" id="montaze">
  <div class="container montaze-inner">
    <div data-reveal>
      <div class="eyebrow" id="montaze-eyebrow"></div>
      <h2 class="section-title" id="montaze-title"></h2>
      <p class="montaze-desc" id="montaze-desc"></p>
    </div>
    <ul class="montaze-list" id="montaze-list"></ul>
  </div>
</section>

<!-- WHY US -->
<section class="why-us py stamp-frame" id="proc-my">
  <div class="container">
    <div class="section-head" data-reveal>
      <div class="eyebrow" id="whyus-eyebrow"></div>
      <h2 class="section-title" id="whyus-title" style="max-width:520px"></h2>
    </div>
    <div class="why-grid" id="whyus-grid"></div>
  </div>
</section>

<!-- TIMELINE -->
<section class="timeline py" id="postup">
  <div class="container">
    <div class="section-head" data-reveal>
      <div class="eyebrow" id="timeline-eyebrow"></div>
      <h2 class="section-title" id="timeline-title"></h2>
    </div>
    <div class="timeline-list" id="timeline-list"></div>
  </div>
</section>

<!-- GALLERY -->
<section class="gallery py" id="reference">
  <div class="container">
    <div class="section-head" data-reveal style="color:#F7F8FA">
      <div class="eyebrow" id="gallery-eyebrow"></div>
      <h2 class="section-title" id="gallery-title" style="color:#F7F8FA"></h2>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
  </div>
</section>

<!-- ABOUT -->
<section class="about py" id="o-nas">
  <div class="container about-inner">
    <div data-reveal>
      <div class="eyebrow" id="about-eyebrow"></div>
      <h2 class="section-title" id="about-title"></h2>
      <p class="about-text" id="about-text"></p>
    </div>
    <div class="about-img" data-reveal>
      <img id="about-img" src="" alt="">
    </div>
  </div>
</section>

<!-- FAQ -->
<section class="faq py" id="faq">
  <div class="container">
    <div class="section-head" data-reveal>
      <div class="eyebrow" id="faq-eyebrow"></div>
      <h2 class="section-title" id="faq-title"></h2>
    </div>
    <div class="faq-list" id="faq-list"></div>
  </div>
</section>

<!-- CONTACT -->
<section class="contact py stamp-frame" id="kontakt">
  <div class="container contact-inner">
    <div data-reveal>
      <div class="eyebrow" id="contact-eyebrow"></div>
      <h2 class="section-title" id="contact-title" style="color:#F7F8FA"></h2>
      <p class="section-subtitle" id="contact-subtitle" style="color:rgba(247,248,250,0.7)"></p>
      <div id="contact-info"></div>
    </div>
    <form class="form-grid" id="contact-form" data-reveal>
      <div class="form-row">
        <div class="field"><label id="label-name"></label><input type="text" name="name" required></div>
        <div class="field"><label id="label-phone"></label><input type="tel" name="phone"></div>
      </div>
      <div class="field"><label id="label-email"></label><input type="email" name="email" required></div>
      <div class="field"><label id="label-message"></label><textarea name="message" required></textarea></div>
      <button type="submit" class="btn btn-primary" id="form-submit" style="width:fit-content"></button>
      <p class="form-status" id="form-status"></p>
    </form>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="container">
    <div class="footer-inner">
      <div class="footer-brand">
        <div class="logo" style="color:#F7F8FA"><span class="dot"></span><span id="footer-name"></span></div>
        <p class="footer-tagline" id="footer-tagline"></p>
      </div>
      <nav class="footer-links" id="footer-links"></nav>
    </div>
    <div class="footer-bottom" id="footer-copyright"></div>
  </div>
</footer>

<script src="js/icons.js"></script>
<script src="js/main.js"></script>
</body>
</html>
